<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse and study a concise Morra Gambit compendium chapter by chapter on an interactive board." />
    <meta name="theme-color" content="#2f5f9f" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%232f5f9f'/><g fill='%23ffffff'><circle cx='12' cy='7' r='3'/><path d='M9 12h6l1.5 4h-9z'/><rect x='6.5' y='17' width='11' height='2.5' rx='1'/></g></svg>" />
    <title>Morra Gambit Compendium</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="site-header">
          <h1>Morra Gambit Compendium</h1>
        </div>
        <div class="topbar-source">
          <a class="source-link" href="https://github.com/zl050/morra-gambit-compendium" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository" title="GitHub repository">
            <svg class="source-icon" viewBox="0 0 98 96" fill="currentColor" aria-hidden="true">
              <path d="M41.4395 69.3848C28.8066 67.8535 19.9062 58.7617 19.9062 46.9902C19.9062 42.2051 21.6289 37.0371 24.5 33.5918C23.2559 30.4336 23.4473 23.7344 24.8828 20.959C28.7109 20.4805 33.8789 22.4902 36.9414 25.2656C40.5781 24.1172 44.4062 23.543 49.0957 23.543C53.7852 23.543 57.6133 24.1172 61.0586 25.1699C64.0254 22.4902 69.2891 20.4805 73.1172 20.959C74.457 23.543 74.6484 30.2422 73.4043 33.4961C76.4668 37.1328 78.0937 42.0137 78.0937 46.9902C78.0937 58.7617 69.1934 67.6621 56.3691 69.2891C59.623 71.3945 61.8242 75.9883 61.8242 81.252L61.8242 91.2051C61.8242 94.0762 64.2168 95.7031 67.0879 94.5547C84.4102 87.9512 98 70.6289 98 49.1914C98 22.1074 75.9883 6.69539e-07 48.9043 4.309e-07C21.8203 1.92261e-07 -1.9479e-07 22.1074 -4.3343e-07 49.1914C-6.20631e-07 70.4375 13.4941 88.0469 31.6777 94.6504C34.2617 95.6074 36.75 93.8848 36.75 91.3008L36.75 83.6445C35.4102 84.2188 33.6875 84.6016 32.1562 84.6016C25.8398 84.6016 22.1074 81.1563 19.4277 74.7441C18.375 72.1602 17.2266 70.6289 15.0254 70.3418C13.877 70.2461 13.4941 69.7676 13.4941 69.1934C13.4941 68.0449 15.4082 67.1836 17.3223 67.1836C20.0977 67.1836 22.4902 68.9063 24.9785 72.4473C26.8926 75.2227 28.9023 76.4668 31.2949 76.4668C33.6875 76.4668 35.2187 75.6055 37.4199 73.4043C39.0469 71.7773 40.291 70.3418 41.4395 69.3848Z" />
            </svg>
          </a>
          <a class="source-link" href="https://lichess.org/study/3CN0md5N" target="_blank" rel="noopener noreferrer" aria-label="Lichess study" title="Lichess study">
            <svg class="source-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M10.457 6.161a.237.237 0 0 0-.296.165c-.8 2.785 2.819 5.579 5.214 7.428.653.504 1.216.939 1.591 1.292 1.745 1.642 2.564 2.851 2.733 3.178a.24.24 0 0 0 .275.122c.047-.013 4.726-1.3 3.934-4.574a.257.257 0 0 0-.023-.06L18.204 3.407 18.93.295a.24.24 0 0 0-.262-.293c-1.7.201-3.115.435-4.5 1.425-4.844-.323-8.718.9-11.213 3.539C.334 7.737-.246 11.515.085 14.128c.763 5.655 5.191 8.631 9.081 9.532.993.229 1.974.34 2.923.34 3.344 0 6.297-1.381 7.946-3.85a.24.24 0 0 0-.372-.3c-3.411 3.527-9.002 4.134-13.296 1.444-4.485-2.81-6.202-8.41-3.91-12.749C4.741 4.221 8.801 2.362 13.888 3.31c.056.01.115 0 .165-.029l.335-.197c.926-.546 1.961-1.157 2.873-1.279l-.694 1.993a.243.243 0 0 0 .02.202l6.082 10.192c-.193 2.028-1.706 2.506-2.226 2.611-.287-.645-.814-1.364-2.306-2.803-.422-.407-1.21-.941-2.124-1.56-2.364-1.601-5.937-4.02-5.391-5.984a.239.239 0 0 0-.165-.295z" />
            </svg>
          </a>
        </div>
      </header>

      <aside class="sidebar">
        <section class="chapter-panel" aria-labelledby="chapter-heading">
          <h2 id="chapter-heading">Chapters</h2>
          <select id="chapter-select" aria-label="Select chapter">
            <option value="" hidden>Select a chapter</option>
          </select>
        </section>

        <section class="tools-panel" aria-label="Board tools">
          <h2>Tools</h2>
          <div class="tool-list">
            <button id="toggle-search" class="tool-bar" type="button" aria-label="Search" aria-expanded="false">
              <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7" /><path d="M21 21l-4.3-4.3" />
              </svg>
              <span class="tool-label">Search</span>
            </button>
            <div id="search-row" class="tool-row" hidden>
              <input id="search-input" class="tool-input" type="text" placeholder="Enter PGN or FEN" aria-label="Search by PGN or FEN" />
              <button id="search-go" class="tool-copy" type="button" title="Search" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="9 10 4 15 9 20" /><path d="M20 4v7a4 4 0 0 1-4 4H4" />
                </svg>
              </button>
            </div>
            <p id="search-status" class="tool-status" role="status" hidden></p>

            <button id="toggle-export" class="tool-bar" type="button" aria-label="Export" aria-expanded="false">
              <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 14v5a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-5" /><path d="M12 3v12" /><path d="M8 7l4-4 4 4" />
              </svg>
              <span class="tool-label">Export</span>
            </button>
            <div id="export-row" class="tool-row" hidden>
              <input id="export-text" class="tool-input" type="text" readonly aria-label="Current line PGN" />
              <button id="copy-pgn" class="tool-copy" type="button" title="Copy PGN" aria-label="Copy PGN">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="8" y="2" width="8" height="4" rx="1" /><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2" />
                </svg>
              </button>
            </div>

            <button id="quiz-mode" class="tool-bar" type="button" title="Quiz" aria-label="Quiz" aria-expanded="false">
              <svg id="quiz-mode-icon" class="tool-icon" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true">
                <path d="M311.13 257.95a15.07 15.07 0 0 1-12.84 17.03l-147.25 20.6-21.33 32.53-82.64 11.57L68.4 307.1l-24.54 3.44c-.28 0-.56.12-.85.17a15.22 15.22 0 0 1-2.1.14 15.07 15.07 0 0 1-2.08-30.02c.3 0 .57 0 .86-.07l24.54-3.44-29.45-25.51 82.58-11.55 29.45 25.5 147.26-20.6a15.2 15.2 0 0 1 2.11-.14 15.09 15.09 0 0 1 14.95 12.92zm-36.7-38.55a32.4 32.4 0 0 1 10.85-10.32 23.43 23.43 0 0 1 13.42-3.04 27.88 27.88 0 0 1 13.54 5.05 44.56 44.56 0 0 1 11.92 12.59 66.34 66.34 0 0 1 8.39 19.13 77.48 77.48 0 0 1 2.56 22 67.9 67.9 0 0 1-3.5 19.96 46.13 46.13 0 0 1-8.53 15.35 28.16 28.16 0 0 1-12.4 8.55 23.38 23.38 0 0 1-13.77.26 32.01 32.01 0 0 1-12.51-7.12 45.48 45.48 0 0 1-5.74-6.2l-32.27 4.51a131.15 131.15 0 0 0 7.1 15.97 104.57 104.57 0 0 0 18.65 25.52 69.02 69.02 0 0 0 23.9 15.8 48.37 48.37 0 0 0 27.6 2.22 53.43 53.43 0 0 0 26.3-14.87c7.9-7.86 14.42-18.26 19.11-30.52a132 132 0 0 0 8.32-42 153.26 153.26 0 0 0-5.48-46.91 128.76 128.76 0 0 0-18.49-39.93c-7.6-10.73-16.41-18.95-25.78-24.4a53 53 0 0 0-27.96-7.63 48.57 48.57 0 0 0-26.28 8.72 69.88 69.88 0 0 0-20.16 21.9 107.5 107.5 0 0 0-11.99 29.51 137.14 137.14 0 0 0-3.55 21.5l31.2-4.37a49.17 49.17 0 0 1 5.55-11.23m198.3-34.98c-10.92-35.27-27.28-64.76-46.84-87.37-18.55-21.52-39.54-36.26-61.12-44.22-20.15-7.4-40.56-8.74-59.95-4.25-18.06 4.2-35.2 13.47-50.6 27.62-14.42 13.21-26.1 29.63-35.19 47.81a233.22 233.22 0 0 0-19.29 56.57 286.02 286.02 0 0 0-5.85 60.68l22.58-3.16a209.14 209.14 0 0 1 5.05-40.35 166.26 166.26 0 0 1 15.97-42.92c7.36-13.4 16.71-25.13 28-34.1 11.89-9.43 24.88-14.98 38.3-16.63 14.16-1.77 28.77.74 42.93 7.5 14.87 7.1 29.09 18.79 41.49 34.78 12.85 16.58 23.51 37.46 30.66 61.92a225.51 225.51 0 0 1 8.74 74.65c-1.26 24.05-6.4 46.42-14.72 65.66-8.04 18.58-18.86 33.88-31.83 44.88-12.3 10.47-26.34 16.91-41.46 18.65a76.23 76.23 0 0 1-41.16-7.1c-12.32-5.72-23.83-14.48-34.03-25.5a162.21 162.21 0 0 1-25.73-37.64 204.58 204.58 0 0 1-14.54-38.58l-22.48 3.1a280.96 280.96 0 0 0 19.96 57.83 228.2 228.2 0 0 0 32.17 50.09c13 15.18 27.82 27.83 43.92 36.8 17.18 9.56 36.02 15.05 55.7 14.86 21.26-.21 41.44-7.03 59.52-19.78 19.36-13.66 36-33.9 48.62-59.43 13.24-26.82 21.7-58.8 24.05-93.64a300.74 300.74 0 0 0-12.86-108.76z"/>
              </svg>
              <svg id="quiz-exit-icon" class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display: none">
                <rect width="18" height="18" x="3" y="3" rx="2" /><path d="m15 9-6 6" /><path d="m9 9 6 6" />
              </svg>
              <span class="tool-label">Quiz</span>
            </button>
            <p id="quiz-status" class="tool-status" role="status" hidden></p>
          </div>
        </section>

        <section class="description-panel" aria-live="polite">
          <div id="notes-block" class="notes-block">
            <h2 class="panel-label">Notes</h2>
            <div id="description-text"></div>
          </div>
        </section>

      </aside>

      <main class="board-shell">
        <div class="board-frame">
          <div id="board" class="board pieces-merida" aria-label="Chessboard"></div>
          <div id="board-resize" class="board-resize" title="Drag to resize the board" aria-hidden="true"></div>
        </div>
      </main>

      <aside id="tree-panel" class="tree-panel" aria-label="Repertoire">
        <div class="tree-box">
          <section id="engine-panel" class="engine-panel" aria-label="Engine analysis">
            <div class="engine-panel-header">
              <button id="engine-toggle" class="engine-switch" type="button" role="switch" aria-checked="false" aria-label="Toggle engine analysis">
                <span class="engine-switch-knob"></span>
              </button>
              <span id="engine-eval" class="engine-eval"> </span>
              <span class="engine-meta">
                <span class="engine-meta-line engine-meta-primary">Stockfish NNUE</span>
                <span class="engine-meta-line">
                  <span id="engine-meta-secondary"></span>
                  <span id="engine-cloud-badge" class="engine-cloud-badge">Cloud</span>
                </span>
              </span>
              <span class="engine-info">
                <button id="engine-info-btn" class="engine-icon-btn" type="button" aria-label="Cloud eval info" aria-describedby="engine-info-tip">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 16v-4" /><path d="M12 8h.01" />
                  </svg>
                </button>
                <span id="engine-info-tip" class="engine-info-tip" role="tooltip">pre-fetched Cloud analysis</span>
              </span>
            </div>
            <p id="engine-note" class="engine-note" role="status" hidden></p>
            <div id="engine-pvs" class="engine-pvs" hidden></div>
            <div id="engine-pv-preview" class="engine-pv-preview" hidden aria-hidden="true">
              <div id="engine-pv-preview-board" class="pieces-merida"></div>
            </div>
          </section>
          <div id="tree" class="tree"></div>
          <div id="fork-panel" class="fork-panel" aria-label="Branch options" hidden></div>
        </div>
        <div class="repertoire-controls" aria-label="Move navigation">
          <button id="start-line" type="button" aria-label="Back to start">
            <svg class="nav-icon nav-icon-jump" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true">
              <path d="M499 40Q506 35 508 37Q512 38 512 46V466Q512 474 508 475Q506 477 499 472L296 269L293 263V466Q293 473 289 475Q285 477 280 472L77 269Q75 267 73 263V457Q73 463 68 470Q63 475 55 475H18Q10 475 5 470Q0 463 0 457V55Q0 49 5 42Q10 37 18 37H55Q63 37 68 42Q73 49 73 55V249Q74 246 77 243L280 40Q285 35 289 37Q293 39 293 46V249L296 243Z" />
            </svg>
          </button>
          <button id="prev-move" type="button" aria-label="Previous move">
            <svg class="nav-icon" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true">
              <path d="M303 466 117 280Q107 270 107 255Q107 239 117 229L303 43Q314 32 329 32Q344 32 355 43L377 64Q387 74 387 90Q387 106 377 116L238 255L377 393Q387 404 387 419Q387 435 377 445L355 466Q344 477 329 477Q314 477 303 466Z" />
            </svg>
          </button>
          <button id="next-move" type="button" aria-label="Next move">
            <svg class="nav-icon" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true">
              <path d="M405 255Q405 270 395 281L209 467Q199 477 183 477Q167 477 157 467L135 445Q125 435 125 419Q125 404 135 394L274 255L135 116Q125 106 125 90Q125 74 135 64L157 43Q168 32 183 32Q198 32 209 43L395 229Q405 239 405 255Z" />
            </svg>
          </button>
          <button id="end-line" type="button" aria-label="Forward to end">
            <svg class="nav-icon nav-icon-jump" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true">
              <path d="M13 472Q6 477 4 475Q0 474 0 466V46Q0 38 4 37Q6 35 13 40L216 243L219 249V46Q219 39 223 37Q227 35 232 40L435 243Q438 246 439 249V55Q439 49 444 42Q449 37 457 37H494Q502 37 507 42Q512 49 512 55V457Q512 463 507 470Q502 475 494 475H457Q449 475 444 470Q439 463 439 457V263Q437 267 435 269L232 472Q227 477 223 475Q219 473 219 466V263L216 269Z" />
            </svg>
          </button>
        </div>
      </aside>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
